<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algoritmo Scanline Fill</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f4f7f6;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        h1 { color: #2c3e50; margin-bottom: 20px; }
        .canvas-container {
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid #ddd;
        }
        canvas {
            border: 1px solid #eee;
            display: block;
        }
        .controls {
            margin-top: 20px;
            color: #7f8c8d;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
     <h1>Visualización de Scanline Fill</h1>

    <div class="canvas-container">
        <canvas id="canvas" width="600" height="450"></canvas>
    </div>

    <div class="controls">
        <p>El polígono rojo es el contorno, el relleno celeste es el resultado del algoritmo.</p>
    </div>

    <!-- Importamos el script externo -->
    <script src="script.js"></script>
</body>
</html>
